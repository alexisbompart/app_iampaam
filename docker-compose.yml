version: '3.8'

services:
  app:
    image: php:8.2-fpm
    container_name: laravel_php82
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - laravel_network
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Permite acceder al host
    environment:
      - DB_HOST=host.docker.internal  # << USA ESTO PARA CONECTAR AL HOST
      - DB_PORT=5432
      - DB_DATABASE=iampaam_db
      - DB_USERNAME=iampaam_user
      - DB_PASSWORD=20.Iampaam26

  webserver:
    image: nginx:alpine
    container_name: nginx_webserver
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_network

networks:
  laravel_network:
    driver: bridge
