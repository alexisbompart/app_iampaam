version: '3.8'

services:
  app:
    image: php:8.2-fpm
    container_name: laravel_php82
    working_dir: /var/www/html/app_iampaam
    volumes:
      - /var/www/html/app_iampaam:/var/www/html/app_iampaam
    networks:
      - laravel_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_DATABASE=iampaam_db
      - DB_USERNAME=iampaam_user
      - DB_PASSWORD=20.Iampaam26
    depends_on:
      - postgres_test
    command: bash -c "dockerize -wait tcp://host.docker.internal:5432 -timeout 60s && php-fpm"

  webserver:
    image: nginx:alpine
    container_name: nginx_webserver
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/www/html/app_iampaam:/var/www/html/app_iampaam
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_network

  postgres_test:
    image: postgres:15
    container_name: postgres_test
    ports:
      - "5433:5432"  # Puerto diferente para no conflictuar con PostgreSQL del host
    environment:
      - POSTGRES_DB=iampaam_test
      - POSTGRES_USER=iampaam_test_user
      - POSTGRES_PASSWORD=test_password
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - laravel_network

volumes:
  postgres_test_data:

networks:
  laravel_network:
    driver: bridge
