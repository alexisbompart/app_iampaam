services:
  app:
    image: php:8.2-fpm
    container_name: laravel_php82
    working_dir: /var/www/html/app_iampaam
    volumes:
      - .:/var/www/html/app_iampaam
    networks:
      - laravel_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=postgres_test
      - DB_PORT=5432
      - DB_DATABASE=iampaam_db
      - DB_USERNAME=iampaam_user
      - DB_PASSWORD=iampaam_password

  webserver:
    image: nginx:alpine
    container_name: nginx_webserver
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html/app_iampaam
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel_network

  postgres_test:
    image: postgres:15
    container_name: postgres_test
    environment:
      - POSTGRES_DB=iampaam_db
      - POSTGRES_USER=iampaam_user
      - POSTGRES_PASSWORD=20.Iampaam26
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - laravel_network

volumes:
  postgres_data:

networks:
  laravel_network:
    driver: bridge
